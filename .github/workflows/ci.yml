name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run trtc (client) tests
        run: uv run --package trtc python -m unittest discover -s trtc/tests -v
      - name: Run trtc-server tests
        # tensorrt is a real dependency of trtc-server but tests stub the
        # build subprocess; skip installing the multi-GB wheels.
        run: |
          uv sync --package trtc-server \
            --no-install-package tensorrt-cu12 \
            --no-install-package tensorrt-cu12-bindings \
            --no-install-package tensorrt-cu12-libs
          uv run --no-sync --package trtc-server python -m unittest discover -s trtc-server/tests -v

  builder-image:
    # One builder image per supported TensorRT version: engines are
    # TRT-version-locked, so a shared registry holds trt<major.minor> tags and
    # clients select by their plan's pin. The per-version pin is applied here
    # (uv add + relock, never committed); the repo lock stays the dev default.
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        tensorrt: ["10.13.3.9.post1", "11.1.0.106", "10.16.1.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: |
            experimental-features = nix-command flakes ca-derivations
            sandbox = false
            keep-env-derivations = true
            keep-outputs = true

      - name: Cache nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: trtc-builder-${{ matrix.tensorrt }}-${{ hashFiles('uv.lock', 'flake.lock', 'flake.nix', '**/pyproject.toml') }}
          restore-prefixes-first-match: trtc-builder-${{ matrix.tensorrt }}-
          gc-max-store-size-linux: 16G
          purge: true
          purge-prefixes: trtc-builder-${{ matrix.tensorrt }}-
          purge-created: 0
          purge-primary-key: never

      - uses: astral-sh/setup-uv@v5

      - name: Pin TensorRT for this matrix entry
        run: |
          uv add --package trtc-server "tensorrt-cu12==${{ matrix.tensorrt }}"
          uv lock

      - name: Build image
        run: |
          sudo mkdir -p /run/containers /etc/containers
          sudo chmod 0755 /run/containers
          echo 'unqualified-search-registries = ["docker.io"]' | sudo tee /etc/containers/registries.conf > /dev/null
          nix build --option sandbox false .#trtc-builder --print-build-logs

      - name: Push to ghcr.io
        run: |
          TRT_MM=$(echo "${{ matrix.tensorrt }}" | cut -d. -f1,2)
          IMAGE="ghcr.io/${{ github.repository_owner }}/trtc-builder"
          nix run \
            --option sandbox false \
            .#trtc-builder.copyTo -- \
            --preserve-digests \
            --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "docker://$IMAGE:trt$TRT_MM"
          echo "Pushed $IMAGE:trt$TRT_MM" >> $GITHUB_STEP_SUMMARY
