name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run client tests
        run: uv run --package trtc python -m unittest discover -s trtc/tests -v

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          nix_conf: experimental-features = nix-command flakes

      - name: Build the C++ broker
        run: nix build .#trtc-broker --print-build-logs

      - name: End-to-end (real broker + real client, stubbed TensorRT build)
        run: >
          TRTC_SERVER_BIN=$PWD/result/bin/trtc-server
          uv run --package trtc python -m unittest discover -s trtc-server/tests -v

  builder-image:
    # One builder image per supported TensorRT version, tagged
    # trt<major.minor>. The version list is the tensorrtPins attrset in
    # flake.nix — nowhere else.
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v35
        with:
          # No store cache: the TRT tars + layers (~50GB) can never fit
          # GitHub's 10GB repo cache, so saves evict immediately and only
          # cost minutes. max-jobs overlaps the three tarball extractions
          # and the C++ builds.
          nix_conf: |
            experimental-features = nix-command flakes
            max-jobs = 4
            cores = 0

      - name: Build and push all builder images
        run: |
          nix run .#push-builder-images -- \
            "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            "ghcr.io/${{ github.repository_owner }}/trtc-builder"
